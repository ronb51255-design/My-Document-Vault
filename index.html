<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Document Vault</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
   

<nav>
    <h2>📁 My Documents</h2>

    <div class="menu">
        <button onclick="filterDocs('all')">All</button>
        <button onclick="filterDocs('photo')">Photo</button>
        <button onclick="filterDocs('pdf')">PDF</button>
    </div>
    
</nav>
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search Document...">
</div>

<div class="gallery" id="gallery"></div>
<a href="${doc.pdf}" download="${doc.name}.pdf">
    <button>Download</button>
</a>

<script src="script.js"></script>

</body>
</html>
